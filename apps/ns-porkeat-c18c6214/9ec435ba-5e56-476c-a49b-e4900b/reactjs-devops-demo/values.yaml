app:
  name: "reactjs-devops-demo"
  userId: "9ec435ba-5e56-476c-a49b-e4900b"
  projectName: "reactjs-devops-demo"
  namespace: "user-9ec435ba-5e56-476c-a49b-e4900b"
  framework: "react"
  containerPort: 80
  servicePort: 80
  domain: "tochratana.com"
  host: "reactjs-devops-demo-ns-porkeat-c18c6214.tochratana.com" # managed-by-jenkins-host

image:
  repository: "harbor.devith.it.com/deployment-pipeline/9ec435ba-5e56-476c-a49b-e4900b/reactjs-devops-demo"
  tag: "9ec435ba-5e56-476c-a49b-e4900b-145-00a04cceda3e" # managed-by-jenkins-image-tag
  pullPolicy: "IfNotPresent"

replicaCount: 1

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  tls:
    enabled: true
    secretName: "reactjs-devops-demo-tls"

imagePullSecrets:
  - name: "registry-secret"

envJson: |
  []

probes:
  mode: "http"
  startup:
    enabled: false
    path: "/"
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 24
  readiness:
    enabled: true
    path: "/"
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
  liveness:
    enabled: true
    path: "/"
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 3
