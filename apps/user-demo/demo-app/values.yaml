app:
  name: "demo-app"
  userId: "user-demo"
  projectName: "demo-app"
  namespace: "user-user-demo"
  framework: "nodejs"
  containerPort: 3000
  servicePort: 80
  domain: "apps.example.com"
  host: "demo-app.apps.example.com"

image:
  repository: "registry.example.com/platform/user-demo/demo-app"
  tag: "user-demo-1-abc123def456" # managed-by-jenkins-image-tag
  pullPolicy: "IfNotPresent"

replicaCount: 1

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

probes:
  readiness:
    enabled: true
    path: "/"
    initialDelaySeconds: 10
    periodSeconds: 10
  liveness:
    enabled: true
    path: "/"
    initialDelaySeconds: 30
    periodSeconds: 15

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  tls:
    enabled: true
    secretName: "demo-app-tls"

imagePullSecrets:
  - name: "registry-secret"

env: []
nodeSelector: {}
tolerations: []
affinity: {}
