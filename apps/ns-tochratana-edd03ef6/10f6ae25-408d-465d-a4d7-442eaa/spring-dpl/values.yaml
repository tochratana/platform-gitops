app:
  name: "spring-dpl"
  userId: "10f6ae25-408d-465d-a4d7-442eaa"
  projectName: "spring-dpl"
  namespace: "user-10f6ae25-408d-465d-a4d7-442eaa"
  framework: "springboot-gradle"
  containerPort: 8080
  servicePort: 80
  domain: "tochratana.com"
  host: "spring-dpl-ns-tochratana-edd03ef6.tochratana.com" # managed-by-jenkins-host

image:
  repository: "harbor.devith.it.com/deployment-pipeline/10f6ae25-408d-465d-a4d7-442eaa/spring-dpl"
  tag: "10f6ae25-408d-465d-a4d7-442eaa-128-0f72e7020610" # managed-by-jenkins-image-tag
  pullPolicy: "IfNotPresent"

replicaCount: 1

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  tls:
    enabled: true
    secretName: "spring-dpl-tls"

imagePullSecrets:
  - name: "registry-secret"

envJson: |
  []

probes:
  mode: "tcp"
  startup:
    enabled: true
    path: "/"
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 24
  readiness:
    enabled: true
    path: "/"
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
  liveness:
    enabled: true
    path: "/"
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 3
