app:
  name: "tochratana-spring-dpl-807"
  userId: "159990218"
  projectName: "tochratana-spring-dpl-807"
  namespace: "user-159990218"
  framework: "springboot-gradle"
  containerPort: 8080
  servicePort: 80
  domain: "tochratana.com"
  host: "tochratana-spring-dpl-807-ws-159990218.tochratana.com" # managed-by-jenkins-host

image:
  repository: "harbor.devith.it.com/deployment-pipeline/159990218/tochratana-spring-dpl-807"
  tag: "159990218-104-0f72e7020610" # managed-by-jenkins-image-tag
