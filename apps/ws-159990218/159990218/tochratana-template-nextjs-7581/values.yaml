app:
  name: "sample-app"
  userId: "user-123"
  projectName: "sample-app"
  namespace: "user-user-123"
  framework: "nodejs"
  containerPort: 3000
  servicePort: 80
  domain: "apps.example.com"
  host: "tochratana-template-nextjs-7581-ws-159990218.tochratana.com"

image:
  repository: "registry.example.com/platform/user-123/sample-app"
  tag: "159990218-90-5a834425d3af"# managed-by-jenkins-image-tag
  pullPolicy: "IfNotPresent"

replicaCount: 1

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

probes:
  readiness:
    enabled: true
    path: "/"
    initialDelaySeconds: 10
    periodSeconds: 10
  liveness:
    enabled: true
    path: "/"
    initialDelaySeconds: 30
    periodSeconds: 15

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  tls:
    enabled: false
    secretName: ""

imagePullSecrets:
  - name: "registry-secret"

env: []
nodeSelector: {}
tolerations: []
affinity: {}
