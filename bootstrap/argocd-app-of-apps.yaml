# Declaritive for each chart for deploy service 

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: git@github.com:yourorg/platform-gitops.git
    targetRevision: HEAD
    path: apps
    directory:
      recurse: true          # watches all subfolders under apps/

  destination:
    server: https://kubernetes.default.svc
    namespace: apps

  syncPolicy:
    automated:
      prune: true            # removes resources deleted from git
      selfHeal: true         # reverts manual kubectl changes
    syncOptions:
      - CreateNamespace=true