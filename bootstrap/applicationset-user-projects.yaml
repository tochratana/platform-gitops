apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: user-projects
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/tochratana/platform-gitops.git
        revision: main
        files:
          - path: apps/*/*/*/Chart.yaml
  template:
    metadata:
      name: '{{ printf "%s-%s-%s" (index .path.segments 1) (index .path.segments 2) (index .path.segments 3) | trunc 63 | trimSuffix "-" }}'
      labels:
        platform.devops/workspace-id: '{{ index .path.segments 1 }}'
        platform.devops/user-id: '{{ index .path.segments 2 }}'
        platform.devops/project-name: '{{ index .path.segments 3 }}'
    spec:
      project: default
      source:
        repoURL: https://github.com/tochratana/platform-gitops.git
        targetRevision: main
        path: 'apps/{{ index .path.segments 1 }}/{{ index .path.segments 2 }}/{{ index .path.segments 3 }}'
        helm:
          releaseName: '{{ printf "%s-%s" (index .path.segments 2) (index .path.segments 3) | trunc 53 | trimSuffix "-" }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: 'user-{{ index .path.segments 2 }}'
      syncPolicy:
        automated:
          # During clean-start/reset phases, keep prune disabled to avoid
          # deleting workloads when apps/ is temporarily empty.
          prune: false
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
